name: Wiesn Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiesn-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run monitor
        env:
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_TOKEN_ERROR: ${{ secrets.PUSHOVER_TOKEN_ERROR }}
        run: python -m src.main

      - name: Commit state
        run: |
          git config user.name  "wiesn-monitor[bot]"
          git config user.email "wiesn-monitor@users.noreply.github.com"
          git add state/state.json
          if git diff --cached --quiet; then
            echo "no state change"
          else
            git commit -m "state: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
