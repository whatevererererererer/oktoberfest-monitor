name: Wiesn Monitor

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiesn-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-v1

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[headless]
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            python -m playwright install --with-deps chromium
          else
            python -m playwright install-deps chromium
          fi

      - name: Run monitor
        env:
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_TOKEN_ERROR: ${{ secrets.PUSHOVER_TOKEN_ERROR }}
        run: python -m src.main

      - name: Commit state
        run: |
          git config user.name  "wiesn-monitor[bot]"
          git config user.email "wiesn-monitor@users.noreply.github.com"
          git add state/state.json
          if git diff --cached --quiet; then
            echo "no state change"
          else
            git commit -m "state: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
